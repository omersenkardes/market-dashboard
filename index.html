<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Dashboard</title>
<script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<style>
:root {
  --bg:#0a0e17; --surface:#111827; --surface2:#1a2235;
  --border:#1e2d45; --accent:#3b82f6; --up:#10b981; --down:#ef4444;
  --text:#e2e8f0; --text-dim:#64748b; --text-bright:#f8fafc;
  --font-mono:'SF Mono','Fira Code',monospace;
  --font-ui:'Inter','Segoe UI',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);min-height:100vh;overflow-x:hidden}

/* ── Header ── */
header{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;
  background:var(--surface);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;gap:12px;flex-wrap:wrap}
.header-left{display:flex;align-items:center;gap:14px}
.logo{font-family:var(--font-mono);font-size:13px;font-weight:700;color:var(--accent);letter-spacing:.08em;white-space:nowrap}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--up);box-shadow:0 0 6px var(--up);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.header-clock{font-family:var(--font-mono);font-size:12px;color:var(--text-dim)}
.data-status{font-size:11px;padding:3px 9px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);color:var(--text-dim)}
.data-status.live{border-color:var(--up);color:var(--up)}
.data-status.partial{border-color:#f59e0b;color:#f59e0b}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text);transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--border);color:var(--text-bright)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:#2563eb;border-color:#2563eb}
.btn.active-toggle{background:rgba(59,130,246,.15);border-color:var(--accent);color:var(--accent)}

/* ── Tabs ── */
.tabs{display:flex;align-items:center;gap:4px;padding:9px 18px;background:var(--surface);
  border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:4px 13px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;
  border:1px solid transparent;color:var(--text-dim);white-space:nowrap;transition:all .15s;background:transparent}
.tab:hover{color:var(--text);border-color:var(--border)}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── API Key Banner ── */
.api-banner{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.3);
  border-radius:8px;padding:12px 16px;margin:14px 18px 0;display:flex;align-items:center;
  justify-content:space-between;gap:12px;flex-wrap:wrap}
.api-banner.hidden{display:none}
.api-banner-text{font-size:12px;color:#f59e0b}
.api-banner-text strong{display:block;font-size:13px;margin-bottom:2px}
.api-key-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.api-input{background:var(--bg);border:1px solid var(--border);border-radius:6px;
  padding:5px 10px;color:var(--text-bright);font-family:var(--font-mono);font-size:12px;
  outline:none;width:220px;transition:border-color .15s}
.api-input:focus{border-color:var(--accent)}

/* ── Main ── */
main{padding:14px 18px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;margin-top:18px}
.section-header:first-child{margin-top:0}
.section-title{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
  color:var(--text-dim);display:flex;align-items:center;gap:8px}
.section-count{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:1px 7px;font-size:10px;color:var(--text-dim)}
.drag-hint{font-size:10px;color:var(--text-dim);opacity:.6}

/* ── Grid ── */
.chart-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:9px}

/* ── Card ── */
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;
  overflow:hidden;cursor:pointer;transition:border-color .15s,transform .15s,box-shadow .15s;position:relative}
.chart-card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.4)}
.chart-card.sortable-ghost{opacity:.35;border:1px dashed var(--accent);background:rgba(59,130,246,.05)}
.chart-card.sortable-chosen{transform:scale(1.02);box-shadow:0 8px 30px rgba(0,0,0,.6);z-index:10}
.drag-handle{position:absolute;top:6px;right:6px;opacity:0;color:var(--text-dim);
  font-size:11px;cursor:grab;transition:opacity .15s;z-index:5;padding:2px 4px}
.chart-card:hover .drag-handle{opacity:.6}
.drag-handle:active{cursor:grabbing}

.card-header{display:flex;align-items:flex-start;justify-content:space-between;padding:8px 10px 5px}
.card-symbol{font-family:var(--font-mono);font-size:12px;font-weight:700;color:var(--text-bright);letter-spacing:.03em}
.card-source{font-size:9px;color:var(--text-dim);margin-top:1px;font-family:var(--font-mono)}
.card-price-block{text-align:right;padding-right:18px}
.card-price{font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--text-bright)}
.card-change{font-family:var(--font-mono);font-size:10px;font-weight:600;margin-top:1px}
.card-change.up{color:var(--up)} .card-change.down{color:var(--down)}
.chart-wrap{height:78px;padding:0 2px 3px}
.card-footer{display:flex;align-items:center;justify-content:space-between;padding:4px 10px 7px}
.card-vol{font-size:10px;color:var(--text-dim)}
.card-age{font-size:9px;color:var(--text-dim);font-family:var(--font-mono)}
.alarm-btn{width:22px;height:22px;border-radius:5px;border:1px solid var(--border);background:transparent;
  color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:11px;transition:all .15s}
.alarm-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(59,130,246,.08)}
.alarm-btn.has-alarm{border-color:#f59e0b;color:#f59e0b;background:rgba(245,158,11,.08)}

/* stale indicator */
.card-stale{position:absolute;top:0;left:0;right:0;height:2px;background:rgba(245,158,11,.4);display:none}
.chart-card.stale .card-stale{display:block}

/* ── Detail Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;
  align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  width:100%;max-width:880px;max-height:92vh;overflow:hidden;display:flex;flex-direction:column}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-bottom:1px solid var(--border)}
.modal-symbol{font-family:var(--font-mono);font-size:17px;font-weight:700;color:var(--text-bright)}
.modal-meta{font-size:11px;color:var(--text-dim);margin-top:2px}
.modal-price-row{display:flex;align-items:baseline;gap:10px}
.modal-price{font-family:var(--font-mono);font-size:22px;font-weight:700;color:var(--text-bright)}
.modal-change{font-family:var(--font-mono);font-size:14px;font-weight:600}
.modal-change.up{color:var(--up)} .modal-change.down{color:var(--down)}
.modal-close{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:transparent;
  color:var(--text-dim);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.modal-close:hover{background:var(--border);color:var(--text-bright)}
.modal-timeframes{display:flex;gap:3px;padding:9px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.tf-btn{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;
  border:1px solid transparent;color:var(--text-dim);background:transparent;
  font-family:var(--font-mono);transition:all .15s}
.tf-btn:hover{color:var(--text);border-color:var(--border)}
.tf-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.modal-chart-wrap{flex:1;min-height:300px;padding:4px}
.modal-stats{display:flex;gap:0;border-top:1px solid var(--border)}
.stat-item{flex:1;padding:9px 12px;border-right:1px solid var(--border);text-align:center}
.stat-item:last-child{border-right:none}
.stat-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.stat-val{font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--text-bright)}

/* ── Alarm Modal ── */
.alarm-modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  width:100%;max-width:430px;padding:20px;max-height:90vh;overflow-y:auto}
.alarm-title{font-size:15px;font-weight:700;color:var(--text-bright);margin-bottom:3px}
.alarm-subtitle{font-size:12px;color:var(--text-dim);margin-bottom:16px}
.form-group{margin-bottom:13px}
.form-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;display:block}
.form-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;
  padding:8px 10px;color:var(--text-bright);font-family:var(--font-mono);font-size:13px;outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--accent)}
.form-select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;
  padding:8px 10px;color:var(--text-bright);font-size:13px;outline:none;cursor:pointer;appearance:none}
.form-select:focus{border-color:var(--accent)}
.alarm-actions{display:flex;gap:8px;margin-top:16px}
.alarm-actions .btn{flex:1;justify-content:center}
.alarm-list{margin-top:14px;border-top:1px solid var(--border);padding-top:12px}
.alarm-list-title{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
.alarm-item{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.alarm-item:last-child{border-bottom:none}
.alarm-item-left{color:var(--text)}
.alarm-item-cond{font-family:var(--font-mono);font-size:11px;color:var(--text-dim)}
.alarm-delete{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:12px;padding:2px 6px;border-radius:4px}
.alarm-delete:hover{color:var(--down);background:rgba(239,68,68,.08)}

/* ── Manage Panel ── */
.manage-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;
  align-items:flex-start;justify-content:flex-end}
.manage-overlay.open{display:flex}
.manage-panel{background:var(--surface);border-left:1px solid var(--border);width:360px;height:100vh;
  overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px}
.manage-header{display:flex;align-items:center;justify-content:space-between}
.manage-title{font-size:14px;font-weight:700;color:var(--text-bright)}
.symbol-list{display:flex;flex-direction:column;gap:3px}
.symbol-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);font-size:12px}
.symbol-row-name{flex:1;font-family:var(--font-mono);font-size:12px;color:var(--text-bright)}
.symbol-row-cat{font-size:10px;color:var(--text-dim);background:var(--surface2);padding:1px 6px;border-radius:8px}
.symbol-row-del{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:13px;padding:2px 4px;border-radius:4px}
.symbol-row-del:hover{color:var(--down)}
.add-symbol-form{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px}
.add-symbol-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:11px}

/* ── Toast ── */
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--up);
  color:var(--text-bright);padding:10px 15px;border-radius:8px;font-size:13px;z-index:500;
  transform:translateY(60px);opacity:0;transition:all .25s;max-width:320px;line-height:1.4}
.toast.show{transform:translateY(0);opacity:1}
.toast.error{border-color:var(--down)}
.toast.warn{border-color:#f59e0b}

/* ── Loader overlay on card ── */
.card-loading{position:absolute;inset:0;background:rgba(10,14,23,.7);display:flex;align-items:center;
  justify-content:center;font-size:10px;color:var(--text-dim);letter-spacing:.1em}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="logo">◈ MARKET HUB</span>
    <div class="live-dot" id="liveDot"></div>
    <span class="header-clock" id="clock">--:--:--</span>
    <span class="data-status" id="dataStatus">Bağlanıyor...</span>
  </div>
  <div class="header-right">
    <button class="btn" id="dragToggleBtn" onclick="toggleDragMode()">✥ Düzenle</button>
    <button class="btn" onclick="openAlarmManager()">🔔 Alarmlar</button>
    <button class="btn btn-primary" onclick="openManage()">+ Sembol Ekle</button>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="filterCategory('all',this)">Tümü</button>
  <button class="tab" onclick="filterCategory('crypto',this)">Kripto</button>
  <button class="tab" onclick="filterCategory('dominance',this)">Dominans</button>
  <button class="tab" onclick="filterCategory('forex',this)">Forex</button>
  <button class="tab" onclick="filterCategory('commodity',this)">Emtia & VIX</button>
  <button class="tab" onclick="filterCategory('other',this)">Diğer</button>
</div>

<!-- Backend URL Banner -->
<div class="api-banner" id="apiBanner">
  <div class="api-banner-text">
    <strong>⚡ Backend URL Girilmedi</strong>
    Railway backend'ini bağla — emtia, VIX verileri ve Telegram alarmları için gerekli
  </div>
  <div class="api-key-row">
    <input class="api-input" id="tdKeyInput" placeholder="https://web-production-xxxx.up.railway.app" type="text">
    <button class="btn btn-primary" onclick="saveTwelveDataKey()">Bağlan</button>
    <button class="btn" onclick="document.getElementById('apiBanner').classList.add('hidden')">Şimdi değil</button>
  </div>
</div>

<main id="main"></main>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal" onclick="closeDetailModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div>
        <div class="modal-symbol" id="mSymbol">—</div>
        <div class="modal-meta" id="mMeta">—</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <div>
          <div class="modal-price-row">
            <span class="modal-price" id="mPrice">—</span>
            <span class="modal-change" id="mChange">—</span>
          </div>
          <div style="font-size:10px;color:var(--text-dim);text-align:right;margin-top:2px" id="mSource">—</div>
        </div>
        <button class="modal-close" onclick="closeDetailModalDirect()">✕</button>
      </div>
    </div>
    <div class="modal-timeframes">
      <button class="tf-btn" data-tf="1m"  onclick="changeTF('1m',this)">1dk</button>
      <button class="tf-btn" data-tf="5m"  onclick="changeTF('5m',this)">5dk</button>
      <button class="tf-btn" data-tf="15m" onclick="changeTF('15m',this)">15dk</button>
      <button class="tf-btn" data-tf="1h"  onclick="changeTF('1h',this)">1S</button>
      <button class="tf-btn" data-tf="2h"  onclick="changeTF('2h',this)">2S</button>
      <button class="tf-btn" data-tf="4h"  onclick="changeTF('4h',this)" class="active">4S</button>
      <button class="tf-btn" data-tf="1D"  onclick="changeTF('1D',this)">1G</button>
      <button class="tf-btn" data-tf="1W"  onclick="changeTF('1W',this)">1H</button>
      <button class="tf-btn" data-tf="1M"  onclick="changeTF('1M',this)">1A</button>
    </div>
    <div class="modal-chart-wrap" id="modalChartWrap"></div>
    <div class="modal-stats">
      <div class="stat-item"><div class="stat-label">Açılış</div><div class="stat-val" id="sOpen">—</div></div>
      <div class="stat-item"><div class="stat-label">Yüksek</div><div class="stat-val" id="sHigh">—</div></div>
      <div class="stat-item"><div class="stat-label">Düşük</div><div class="stat-val" id="sLow">—</div></div>
      <div class="stat-item"><div class="stat-label">24s Hacim</div><div class="stat-val" id="sVol">—</div></div>
      <div class="stat-item"><div class="stat-label">Güncelleme</div><div class="stat-val" id="sAge">—</div></div>
    </div>
  </div>
</div>

<!-- Alarm Modal -->
<div class="modal-overlay" id="alarmModal" onclick="event.target===this&&this.classList.remove('open')">
  <div class="alarm-modal" onclick="event.stopPropagation()">
    <div class="alarm-title">🔔 Alarm Kur</div>
    <div class="alarm-subtitle" id="alarmSubtitle">—</div>
    <div class="form-group">
      <label class="form-label">Koşul</label>
      <select class="form-select" id="alarmCondition">
        <option value="above">Fiyat üzerine çıktığında (≥)</option>
        <option value="below">Fiyat altına düştüğünde (≤)</option>
        <option value="change_up">% artış ≥</option>
        <option value="change_down">% düşüş ≥</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label" id="alarmValueLabel">Hedef Fiyat</label>
      <input class="form-input" type="number" id="alarmValue" placeholder="0.00" step="any">
    </div>
    <div class="form-group">
      <label class="form-label">Not (isteğe bağlı)</label>
      <input class="form-input" type="text" id="alarmNote" placeholder="Örn: Destek kırılımı">
    </div>
    <div class="alarm-actions">
      <button class="btn" onclick="document.getElementById('alarmModal').classList.remove('open')">İptal</button>
      <button class="btn btn-primary" onclick="saveAlarm()">Alarmı Kaydet</button>
    </div>
    <div id="alarmListWrap"></div>
  </div>
</div>

<!-- All Alarms Modal -->
<div class="modal-overlay" id="allAlarmsModal" onclick="event.target===this&&this.classList.remove('open')">
  <div class="alarm-modal" onclick="event.stopPropagation()" style="max-width:520px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div class="alarm-title">🔔 Tüm Alarmlar</div>
      <button class="modal-close" onclick="document.getElementById('allAlarmsModal').classList.remove('open')">✕</button>
    </div>
    <div id="allAlarmsList"></div>
  </div>
</div>

<!-- Manage Symbols Panel -->
<div class="manage-overlay" id="manageOverlay" onclick="event.target===this&&closeManage()">
  <div class="manage-panel">
    <div class="manage-header">
      <div class="manage-title">Sembol Yönetimi</div>
      <button class="modal-close" onclick="closeManage()">✕</button>
    </div>
    <div class="add-symbol-form">
      <div class="add-symbol-title">Yeni Sembol Ekle</div>
      <div class="form-group">
        <label class="form-label">Sembol / Ticker</label>
        <input class="form-input" id="newSymbol" placeholder="Örn: BNBUSDT" style="text-transform:uppercase">
      </div>
      <div class="form-group">
        <label class="form-label">Görünen Ad</label>
        <input class="form-input" id="newName" placeholder="Örn: BNB/USDT">
      </div>
      <div class="form-group">
        <label class="form-label">Kategori</label>
        <select class="form-select" id="newCategory">
          <option value="crypto">Kripto</option>
          <option value="dominance">Dominans</option>
          <option value="forex">Forex</option>
          <option value="commodity">Emtia & VIX</option>
          <option value="other">Diğer</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Veri Kaynağı</label>
        <select class="form-select" id="newSource">
          <option value="binance">Binance (kripto)</option>
          <option value="coingecko">CoinGecko (dominans/kripto)</option>
          <option value="frankfurter">Frankfurter (forex)</option>
          <option value="twelvedata">Twelve Data (emtia/endeks)</option>
        </select>
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px" onclick="addSymbol()">+ Ekle</button>
    </div>
    <div>
      <div class="form-label" style="margin-bottom:8px">Mevcut Semboller (<span id="symbolCount">0</span>)</div>
      <div class="symbol-list" id="symbolList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// CONFIG & STATE
// ═══════════════════════════════════════════════════════════════

function loadDemoData() {
  symbols.forEach(s => {
    const base = SEED_PRICES[s.id] || 100;
    const candles = genCandles(base, 100, base > 1000 ? 0.012 : 0.025);
    candleData[s.id] = candles;
    const last = candles[candles.length - 1];
    const first = candles[0];
    prices[s.id] = {
      price: last.close,
      change: ((last.close - first.close) / first.close) * 100,
      open: first.close, high: last.close * 1.02, low: last.close * 0.98,
      vol: Math.random() * base * 50000,
      updatedAt: Date.now(), source: 'demo',
    };
  });
}

function genCandles(basePrice, count, vol) {
  const now = Math.floor(Date.now() / 1000);
  const step = 3600;
  const arr = [];
  let price = basePrice;
  for (let i = count; i >= 0; i--) {
    const open = price;
    const chg = (Math.random() - 0.488) * vol;
    const close = open * (1 + chg);
    const high = Math.max(open, close) * (1 + Math.random() * vol * 0.4);
    const low  = Math.min(open, close) * (1 - Math.random() * vol * 0.4);
    arr.push({time: now - i * step, open, high, low, close, volume: Math.random() * basePrice * 10000});
    price = close;
  }
  return arr;
}

let binanceConnected = false;
let binanceWS = null; // kept for compatibility

function startBinanceWS() {
  // Load real candle data for mini charts first, then start polling
  loadMiniChartCandles().then(() => {
    fetchBinancePrices();
    setInterval(fetchBinancePrices, 3000);
  });
}

async function loadMiniChartCandles() {
  const cryptoSymbols = symbols.filter(s => s.src === 'binance' && !s.invertPrice);
  // Load in batches of 5 to avoid rate limits
  const batches = [];
  for (let i = 0; i < cryptoSymbols.length; i += 5) {
    batches.push(cryptoSymbols.slice(i, i + 5));
  }
  for (const batch of batches) {
    await Promise.all(batch.map(async (sym) => {
      try {
        const res = await fetch(`${BACKEND_URL}/binance/candles?symbol=${sym.binanceTicker.toUpperCase()}&interval=4h&limit=60`);
        if (!res.ok) return;
        const raw = await res.json();
        if (!raw.candles || raw.candles.length === 0) return;
        candleData[sym.id] = raw.candles.map(k => ({
          time: parseInt(k.time),
          open: parseFloat(k.open),
          high: parseFloat(k.high),
          low: parseFloat(k.low),
          close: parseFloat(k.close),
          volume: parseFloat(k.volume),
        }));
        // Update mini chart with real data
        if (miniCharts[sym.id]) {
          const data = candleData[sym.id].map(c => ({time: c.time, value: c.close}));
          miniCharts[sym.id].series.setData(data);
        }
      } catch(e) {
        console.warn('Mini chart candle load failed for', sym.id, e.message);
      }
    }));
  }
}

async function fetchBinancePrices() {
  const cryptoSymbols = symbols.filter(s => s.src === 'binance');
  if (!cryptoSymbols.length) return;

  // Split into regular and inverted (ETHBTC)
  const regular = cryptoSymbols.filter(s => !s.invertPrice);
  const inverted = cryptoSymbols.filter(s => s.invertPrice);

  const allTickers = [
    ...regular.map(s => s.binanceTicker.toUpperCase()),
    ...inverted.map(s => 'ETHBTC'),
  ].join(',');

  try {
    const res = await fetch(`${BACKEND_URL}/binance?symbols=${allTickers}`);
    if (!res.ok) throw new Error('Backend ' + res.status);
    const data = await res.json();
    binanceConnected = true;

    cryptoSymbols.forEach(sym => {
      const ticker = sym.invertPrice ? 'ETHBTC' : sym.binanceTicker.toUpperCase();
      const d = data[ticker];
      if (!d || d.error || !d.price) return;

      let price = parseFloat(d.price);
      let open  = parseFloat(d.open);
      let high  = parseFloat(d.high);
      let low   = parseFloat(d.low);
      if (sym.invertPrice) { price = 1/price; open = 1/open; high = 1/low; low = 1/high; }

      prices[sym.id] = {
        price, open, high, low,
        change: parseFloat(d.change),
        vol: parseFloat(d.volume),
        updatedAt: Date.now(),
        source: 'Binance REST',
      };

      // Update mini chart last point
      if (candleData[sym.id]?.length > 0) {
        const last = candleData[sym.id][candleData[sym.id].length - 1];
        last.close = price;
        last.high = Math.max(last.high, price);
        last.low  = Math.min(last.low, price);
        if (miniCharts[sym.id]) {
          miniCharts[sym.id].series.update({time: last.time, value: price});
        }
      }

      updateCardPrice(sym.id);
      checkAlarms(sym.id, price);

      // Rebuild mini chart with real price direction
      if (miniCharts[sym.id]) {
        const isUp = prices[sym.id].change >= 0;
        const color = isUp ? '#10b981' : '#ef4444';
        // Update line color
        miniCharts[sym.id].series.applyOptions({ color });
        // Update last candle in data
        const data = (candleData[sym.id] || []).map(c => ({time: c.time, value: c.close}));
        if (data.length > 0) miniCharts[sym.id].series.setData(data);
      }

      if (detailSymbol === sym.id && modalCandleSeries) {
        const last = candleData[sym.id]?.[candleData[sym.id].length - 1];
        if (last) { modalCandleSeries.update(last); }
        updateModalMeta(sym.id);
      }
    });

    updateDataStatusIndicator();
  } catch(e) {
    binanceConnected = false;
    console.warn('Binance REST error:', e.message);
    updateDataStatusIndicator();
  }
}

let cgLastFetch = 0;

async function startCoinGeckoPolling() {
  await fetchCoinGecko();
  setInterval(fetchCoinGecko, 60000); // 1 min (rate limit friendly)
}

async function fetchCoinGecko() {
  try {
    // Global data for dominance + total market caps
    const res = await fetch(`${BACKEND_URL}/dominance`);
    if (!res.ok) throw new Error('CG ' + res.status);
    const {data} = await res.json();
    cgLastFetch = Date.now();

    const mc = data.total_market_cap?.usd || 0;
    const mcExBtc = mc * (1 - data.market_cap_percentage?.btc / 100);
    const mcExBtcEth = mc * (1 - (data.market_cap_percentage?.btc + data.market_cap_percentage?.eth) / 100);

    const cgMap = {
      btc_dominance:              {price: data.market_cap_percentage?.btc, prev: null},
      eth_dominance:              {price: data.market_cap_percentage?.eth, prev: null},
      usdt_dominance:             {price: data.market_cap_percentage?.usdt, prev: null},
      esdc_dominance:             {price: (data.market_cap_percentage?.usdc || 0) + (data.market_cap_percentage?.dai || 0), prev: null},
      total_market_cap:           {price: mc, prev: null},
      total_market_cap_ex_btc:    {price: mcExBtc, prev: null},
      total_market_cap_ex_btc_eth:{price: mcExBtcEth, prev: null},
    };

    symbols.filter(s => s.src === 'coingecko').forEach(s => {
      const val = cgMap[s.cgKey];
      if (!val || val.price == null) return;
      const prev = prices[s.id]?.price;
      const chgPct = prev ? ((val.price - prev) / prev) * 100 : 0;
      prices[s.id] = {
        price: val.price,
        change: chgPct,
        open: prev || val.price,
        high: Math.max(prev || val.price, val.price),
        low: Math.min(prev || val.price, val.price),
        vol: 0,
        updatedAt: Date.now(),
        source: 'CoinGecko',
      };
      updateCardPrice(s.id);
      if (miniCharts[s.id]) {
        const last = candleData[s.id]?.[candleData[s.id].length - 1];
        if (last) { last.close = val.price; miniCharts[s.id].series.update({time: last.time, value: val.price}); }
      }
    });
  } catch(e) {
    console.warn('CoinGecko fetch failed:', e.message);
  }
}

async function startFrankfurterPolling() {
  await fetchFrankfurter();
  setInterval(fetchFrankfurter, 30000);
}

async function fetchFrankfurter() {
  const fxSymbols = symbols.filter(s => s.src === 'frankfurter');
  if (fxSymbols.length === 0) return;

  // Group by base currency
  const byBase = {};
  fxSymbols.forEach(s => {
    if (!byBase[s.fxBase]) byBase[s.fxBase] = [];
    byBase[s.fxBase].push(s);
  });

  for (const [base, syms] of Object.entries(byBase)) {
    try {
      const quotes = syms.map(s => s.fxQuote).join(',');
      const res = await fetch(`${BACKEND_URL}/forex?base=${base}&quotes=${quotes}`);
      if (!res.ok) throw new Error('Frankfurter ' + res.status);
      const data = await res.json();
      syms.forEach(s => {
        const rate = data.rates?.[s.fxQuote];
        if (!rate) return;
        const prev = prices[s.id]?.price;
        prices[s.id] = {
          price: rate,
          change: prev ? ((rate - prev) / prev) * 100 : 0,
          open: prev || rate, high: rate, low: rate,
          vol: 0, updatedAt: Date.now(), source: 'Frankfurter',
        };
        updateCardPrice(s.id);
        if (miniCharts[s.id]) {
          const last = candleData[s.id]?.[candleData[s.id].length - 1];
          if (last) { last.close = rate; miniCharts[s.id].series.update({time: last.time, value: rate}); }
        }
      });
    } catch(e) {
      console.warn('Frankfurter error:', e.message);
    }
  }
}

  showToast('✅ Backend bağlandı: ' + url);

  await fetchTwelveData();
  setInterval(fetchTwelveData, 60000);
}
let _tdPollingStarted = false;

async function fetchTwelveData() {
  if (!BACKEND_URL) return;
  const tdSymbols = symbols.filter(s => s.src === 'twelvedata');
  if (tdSymbols.length === 0) return;

  const tickers = tdSymbols.map(s => s.tdSymbol).join(',');
  try {
    const res = await fetch(`${BACKEND_URL}/prices?symbols=${encodeURIComponent(tickers)}`);
    if (!res.ok) throw new Error('TD ' + res.status);
    const data = await res.json();

    tdSymbols.forEach(s => {
      const key = s.tdSymbol;
      const raw = tdSymbols.length === 1 ? data : data[key];
      if (!raw || raw.status === 'error' || !raw.price) return;
      const price = parseFloat(raw.price);
      const prev = prices[s.id]?.price;
      prices[s.id] = {
        price, change: prev ? ((price - prev) / prev) * 100 : 0,
        open: prev || price, high: price, low: price,
        vol: 0, updatedAt: Date.now(), source: 'Twelve Data',
      };
      updateCardPrice(s.id);
      if (miniCharts[s.id]) {
        const last = candleData[s.id]?.[candleData[s.id].length - 1];
        if (last) { last.close = price; miniCharts[s.id].series.update({time: last.time, value: price}); }
      }
      checkAlarms(s.id, price);
    });
  } catch(e) {
    console.warn('TwelveData error:', e.message);
  }
}

function render() {
  const main = document.getElementById('main');
  const visible = activeCategory === 'all'
    ? symbols
    : symbols.filter(s => s.cat === activeCategory);

  if (visible.length === 0) {
    main.innerHTML = '<div style="text-align:center;padding:48px;color:var(--text-dim);font-size:13px">Bu kategoride sembol yok.</div>';
    return;
  }

  // Apply saved order
  if (symbolOrder) {
    visible.sort((a, b) => {
      const ia = symbolOrder.indexOf(a.id);
      const ib = symbolOrder.indexOf(b.id);
      return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
    });
  }

  const groups = {};
  visible.forEach(s => { (groups[s.cat] = groups[s.cat] || []).push(s); });

  let html = '';
  Object.entries(groups).forEach(([cat, syms]) => {
    const info = CATEGORIES[cat] || {label:cat, icon:'•'};
    html += `
      <div class="section-header">
        <div class="section-title">${info.icon} ${info.label} <span class="section-count">${syms.length}</span></div>
        ${dragModeActive ? '<span class="drag-hint">Sürükle & bırak</span>' : ''}
      </div>
      <div class="chart-grid" id="grid-${cat}" data-cat="${cat}">
        ${syms.map(s => renderCard(s)).join('')}
      </div>`;
  });

  main.innerHTML = html;
  miniCharts = {};

  visible.forEach(s => initMiniChart(s.id));

  // Init Sortable on each grid
  sortables.forEach(s => s.destroy());
  sortables = [];
  Object.keys(groups).forEach(cat => {
    const grid = document.getElementById('grid-' + cat);
    if (!grid) return;
    const s = Sortable.create(grid, {
      group: 'cards',
      animation: 150,
      disabled: !dragModeActive,
      handle: dragModeActive ? '.chart-card' : '.drag-handle',
      ghostClass: 'sortable-ghost',
      chosenClass: 'sortable-chosen',
      onEnd: saveOrder,
    });
    sortables.push(s);
  });
}

function renderCard(s) {
  const p = prices[s.id] || {};
  const isUp = (p.change || 0) >= 0;
  const hasAlarm = alarms.some(a => a.symbolId === s.id && a.active);
  const stale = p.updatedAt && (Date.now() - p.updatedAt) > 120000;
  return `
    <div class="chart-card${stale ? ' stale' : ''}" id="card-${s.id}" onclick="openDetail('${s.id}')">
      <div class="card-stale"></div>
      <div class="drag-handle" title="Taşı">⠿</div>
      <div class="card-header">
        <div>
          <div class="card-symbol">${s.name}</div>
          <div class="card-source">${srcLabel(s.src)}</div>
        </div>
        <div class="card-price-block">
          <div class="card-price" id="price-${s.id}">${fmt(p.price)}</div>
          <div class="card-change ${isUp?'up':'down'}" id="change-${s.id}">${fmtChg(p.change||0)}</div>
        </div>
      </div>
      <div class="chart-wrap" id="chartWrap-${s.id}"></div>
      <div class="card-footer">
        <div class="card-vol" id="vol-${s.id}">${p.vol > 0 ? 'Vol: '+fmt(p.vol) : srcLabel(s.src)}</div>
        <button class="alarm-btn ${hasAlarm?'has-alarm':''}" id="alarmBtn-${s.id}"
          onclick="event.stopPropagation();openAlarm('${s.id}')" title="Alarm kur">🔔</button>
      </div>
    </div>`;
}

function srcLabel(src) {
  return {binance:'Binance WS', coingecko:'CoinGecko', frankfurter:'Frankfurter', twelvedata:'Twelve Data', demo:'Demo'}[src] || src;
}

function initMiniChart(id) {
  const wrap = document.getElementById('chartWrap-' + id);
  if (!wrap || !LightweightCharts) return;
  const p = prices[id];
  const isUp = !p || p.change >= 0;
  const color = isUp ? '#10b981' : '#ef4444';

  const chart = LightweightCharts.createChart(wrap, {
    width: wrap.clientWidth || 265, height: 78,
    layout: {background:{type:'solid',color:'transparent'}, textColor:'transparent'},
    grid: {vertLines:{visible:false}, horzLines:{visible:false}},
    crosshair: {mode: LightweightCharts.CrosshairMode.Hidden},
    rightPriceScale:{visible:false}, leftPriceScale:{visible:false},
    timeScale:{visible:false, borderVisible:false},
    handleScroll:false, handleScale:false,
  });

  const series = chart.addLineSeries({
    color: color,
    lineWidth:1.5, priceLineVisible:false, lastValueVisible:false,
  });

  const data = (candleData[id] || []).map(c => ({time:c.time, value:c.close}));
  if (data.length > 0) series.setData(data);
  miniCharts[id] = {chart, series};
}

function updateCardPrice(id) {
  const p = prices[id];
  if (!p) return;
  const prEl = document.getElementById('price-' + id);
  const chEl = document.getElementById('change-' + id);
  const card = document.getElementById('card-' + id);
  if (prEl) prEl.textContent = fmt(p.price);
  if (chEl) {
    chEl.textContent = fmtChg(p.change);
    chEl.className = 'card-change ' + (p.change >= 0 ? 'up' : 'down');
  }
  if (card) {
    const stale = (Date.now() - p.updatedAt) > 120000;
    card.classList.toggle('stale', stale);
  }
}

async function openDetail(id) {
  const sym = symbols.find(s => s.id === id);
  if (!sym) return;
  detailSymbol = id;

  // Set active TF button
  document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));

  if (tfBtn) tfBtn.classList.add('active');

  wrap.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:300px;color:var(--text-dim);font-size:12px">Grafik yükleniyor...</div>';
  if (modalChart) { try { modalChart.remove(); } catch(e){} modalChart = null; }

  document.getElementById('detailModal').classList.add('open');

  // Fetch historical candles for this TF
  const candles = await fetchHistoricalCandles(sym, detailTF);
  if (candles && candles.length > 0) {
    candleData[id] = candles;
  }

  buildModalChart(id);
}

async function fetchHistoricalCandles(sym, tf) {
  // Binance klines
  if (sym.src === 'binance') {
    const intervalMap = {'1m':'1m','5m':'5m','15m':'15m','1h':'1h','2h':'2h','4h':'4h','1D':'1d','1W':'1w','1M':'1M'};
    const interval = intervalMap[tf] || '4h';
    const ticker = sym.invertPrice ? sym.binanceTicker.replace('eth','BTC').replace('btc','ETH') : sym.binanceTicker.toUpperCase();
    const pair = sym.invertPrice ? 'ETHBTC' : ticker;
    try {
      const res = await fetch(`${BACKEND_URL}/binance/candles?symbol=${pair}&interval=${tf}&limit=200`);
      if (!res.ok) throw new Error();
      const raw = await res.json();
      return (raw.candles || []).map(k => ({
        time: parseInt(k.time),
        open: sym.invertPrice ? 1/parseFloat(k.open) : parseFloat(k.open),
        high: sym.invertPrice ? 1/parseFloat(k.low)  : parseFloat(k.high),
        low:  sym.invertPrice ? 1/parseFloat(k.high) : parseFloat(k.low),
        close: sym.invertPrice ? 1/parseFloat(k.close) : parseFloat(k.close),
        volume: parseFloat(k.volume),
      })).sort((a,b)=>a.time-b.time);
    } catch(e) {
      console.warn('Binance klines failed', e);
      return null;
    }
  }

  // Twelve Data historical
  if (sym.src === 'twelvedata' && BACKEND_URL) {
    const intervalMap = {'1m':'1min','5m':'5min','15m':'15min','1h':'1h','2h':'2h','4h':'4h','1D':'1day','1W':'1week','1M':'1month'};
    const interval = intervalMap[tf] || '4h';
    try {
      const res = await fetch(`${BACKEND_URL}/candles?symbol=${encodeURIComponent(sym.tdSymbol)}&interval=${interval}&outputsize=150`);
      if (!res.ok) throw new Error();
      const data = await res.json();
      if (data.status === 'error') throw new Error(data.message);
      return data.values.map(v => ({
        time: Math.floor(new Date(v.datetime).getTime() / 1000),
        open: parseFloat(v.open), high: parseFloat(v.high),
        low: parseFloat(v.low), close: parseFloat(v.close),
        volume: parseFloat(v.volume || 0),
      })).sort((a,b)=>a.time-b.time);
    } catch(e) {
      console.warn('TwelveData historical failed', e);
      return null;
    }
  }

  // Frankfurter historical (daily only)
  if (sym.src === 'frankfurter') {
    try {
      const endDate = new Date().toISOString().split('T')[0];
      const startDate = new Date(Date.now() - 365*24*3600*1000).toISOString().split('T')[0];
      const res = await fetch(`https://api.frankfurter.app/${startDate}..${endDate}?from=${sym.fxBase}&to=${sym.fxQuote}`);
      if (!res.ok) throw new Error();
      const data = await res.json();
      return Object.entries(data.rates).map(([date, rates]) => {
        const price = rates[sym.fxQuote];
        return {time: Math.floor(new Date(date).getTime()/1000), open:price, high:price, low:price, close:price, volume:0};
      }).sort((a,b)=>a.time-b.time);
    } catch(e) {
      console.warn('Frankfurter historical failed', e);
      return null;
    }
  }

  return null;
}

function buildModalChart(id) {
  const wrap = document.getElementById('modalChartWrap');
  wrap.innerHTML = '';

  modalChart = LightweightCharts.createChart(wrap, {
    width: wrap.clientWidth || 840, height: 300,
    layout: {background:{type:'solid',color:'transparent'}, textColor:'#64748b'},
    grid: {vertLines:{color:'#1e2d45'}, horzLines:{color:'#1e2d45'}},
    crosshair: {mode: LightweightCharts.CrosshairMode.Normal},
    rightPriceScale:{borderColor:'#1e2d45'},
    timeScale:{borderColor:'#1e2d45', timeVisible:true, secondsVisible:false},
    handleScroll:true, handleScale:true,
  });

  modalCandleSeries = modalChart.addCandlestickSeries({
    upColor:'#10b981', downColor:'#ef4444',
    borderUpColor:'#10b981', borderDownColor:'#ef4444',
    wickUpColor:'#10b981', wickDownColor:'#ef4444',
  });

  const data = candleData[id] || [];
  if (data.length > 0) {
    modalCandleSeries.setData(data);
    modalChart.timeScale().fitContent();
  }

  modalVolSeries = modalChart.addHistogramSeries({
    color:'#3b82f640', priceFormat:{type:'volume'}, priceScaleId:'vol',
  });
  modalChart.priceScale('vol').applyOptions({scaleMargins:{top:0.85, bottom:0}});
  if (data.length > 0) {
    modalVolSeries.setData(data.map(c => ({
      time:c.time, value:c.volume||0,
      color: c.close >= c.open ? '#10b98130' : '#ef444430',
    })));
  }

  setTimeout(() => { if(modalChart) modalChart.applyOptions({width: wrap.clientWidth}); }, 60);
}

function updateModalMeta(id) {
  const sym = symbols.find(s => s.id === id);
  const p = prices[id];
  if (!sym || !p) return;
  document.getElementById('mSymbol').textContent = sym.name;
  document.getElementById('mMeta').textContent = CATEGORIES[sym.cat]?.label || sym.cat;
  document.getElementById('mPrice').textContent = fmt(p.price);
  document.getElementById('mSource').textContent = p.source || '';
  const mc = document.getElementById('mChange');
  mc.textContent = fmtChg(p.change);
  mc.className = 'modal-change ' + (p.change >= 0 ? 'up' : 'down');
  document.getElementById('sOpen').textContent = fmt(p.open);
  document.getElementById('sHigh').textContent = fmt(p.high);
  document.getElementById('sLow').textContent  = fmt(p.low);
  document.getElementById('sVol').textContent  = p.vol > 0 ? fmt(p.vol) : '—';
  const age = p.updatedAt ? Math.round((Date.now()-p.updatedAt)/1000) : null;
  document.getElementById('sAge').textContent = age !== null ? (age < 60 ? age+'s önce' : Math.floor(age/60)+'dk önce') : '—';
}

// ALARM SYSTEM
// ═══════════════════════════════════════════════════════════════
let currentAlarmSymbol = null;

function openAlarm(id) {
  const sym = symbols.find(s => s.id === id);
  if (!sym) return;
  currentAlarmSymbol = id;
  document.getElementById('alarmSubtitle').textContent = sym.name + ' için fiyat alarmı';
  document.getElementById('alarmValue').value = '';
  document.getElementById('alarmNote').value = '';
  renderAlarmList(id);
  document.getElementById('alarmModal').classList.add('open');
}

function saveAlarm() {
  const val = parseFloat(document.getElementById('alarmValue').value);
  if (isNaN(val) || val <= 0) { showToast('Geçerli bir değer gir', true); return; }
  const condition = document.getElementById('alarmCondition').value;
  const note = document.getElementById('alarmNote').value;
  const sym = symbols.find(s => s.id === currentAlarmSymbol);
  const newAlarm = {id:Date.now(), symbolId:currentAlarmSymbol, symbolName:sym.name,
    condition, value:val, note, active:true, createdAt:new Date().toISOString()};
  alarms.push(newAlarm);
  saveAlarms();
  renderAlarmList(currentAlarmSymbol);
  showToast('✅ Alarm kaydedildi: ' + sym.name);
  // Send to backend for Telegram notification
  if (BACKEND_URL) {
    fetch(BACKEND_URL + '/alarms', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(newAlarm)
    }).catch(e => console.warn('Backend alarm sync failed:', e));
  }
  document.getElementById('alarmValue').value = '';
  document.getElementById('alarmNote').value = '';
  const btn = document.getElementById('alarmBtn-' + currentAlarmSymbol);
  if (btn) btn.classList.add('has-alarm');
}

function renderAlarmList(symbolId) {
  const list = alarms.filter(a => a.symbolId === symbolId);
  const wrap = document.getElementById('alarmListWrap');
  if (!wrap || list.length === 0) { if(wrap) wrap.innerHTML=''; return; }
  const cl = {above:'≥', below:'≤', change_up:'+%≥', change_down:'-%≥'};
  wrap.innerHTML = `<div class="alarm-list"><div class="alarm-list-title">Bu sembol alarmları (${list.length})</div>
    ${list.map(a => `<div class="alarm-item">
      <div><div class="alarm-item-left">${a.note || a.symbolName}</div>
      <div class="alarm-item-cond">${cl[a.condition]} ${a.value} ${a.active?'🟢':'⚫'}</div></div>
      <button class="alarm-delete" onclick="deleteAlarm(${a.id})">✕</button>
    </div>`).join('')}
  </div>`;
}

function deleteAlarm(id) {
  alarms = alarms.filter(a => a.id !== id);
  saveAlarms();
  if (currentAlarmSymbol) renderAlarmList(currentAlarmSymbol);
  renderAllAlarms();
  // update bell
  const alarmSym = alarms.find(a => a.symbolId === currentAlarmSymbol && a.active);
  const btn = document.getElementById('alarmBtn-' + currentAlarmSymbol);
  if (btn) btn.classList.toggle('has-alarm', !!alarmSym);
}

function saveAlarms() { localStorage.setItem('mh_alarms2', JSON.stringify(alarms)); }

function checkAlarms(symbolId, currentPrice) {
  let changed = false;
  alarms.forEach(a => {
    if (a.symbolId !== symbolId || !a.active) return;
    const triggered = (a.condition === 'above' && currentPrice >= a.value) ||
                      (a.condition === 'below' && currentPrice <= a.value);
    if (triggered) {
      a.active = false; changed = true;
      showToast(`🔔 ALARM: ${a.symbolName} → ${fmt(currentPrice)}`, false, 6000, 'warn');
    }
  });
  if (changed) { saveAlarms(); renderAllAlarms(); }
}

function openAlarmManager() { renderAllAlarms(); document.getElementById('allAlarmsModal').classList.add('open'); }

function renderAllAlarms() {
  const el = document.getElementById('allAlarmsList');
  if (!el) return;
  if (alarms.length === 0) {
    el.innerHTML = '<div style="color:var(--text-dim);font-size:13px;text-align:center;padding:24px">Henüz alarm kurulmadı.</div>';
    return;
  }
  const cl = {above:'Üzerine çıkınca', below:'Altına düşünce', change_up:'% artış ≥', change_down:'% düşüş ≥'};
  el.innerHTML = alarms.map(a => `<div class="alarm-item" style="padding:10px 0">
    <div>
      <div class="alarm-item-left" style="font-weight:600">${a.symbolName}</div>
      <div class="alarm-item-cond">${cl[a.condition]}: ${a.value}${a.note ? ' · ' + a.note : ''}</div>
      <div style="font-size:10px;color:var(--text-dim);margin-top:2px">${a.active ? '🟢 Aktif' : '⚫ Tetiklendi'}</div>
    </div>
    <button class="alarm-delete" onclick="deleteAlarm(${a.id});renderAllAlarms()">✕</button>
  </div>`).join('');
}

    <div class="symbol-row">

function addSymbol() {
  const id = document.getElementById('newSymbol').value.trim().toUpperCase();
  const name = document.getElementById('newName').value.trim() || id;
  const cat = document.getElementById('newCategory').value;
  const src = document.getElementById('newSource').value;
  if (!id) { showToast('Sembol adı gir', true); return; }
  if (symbols.find(s => s.id === id)) { showToast('Bu sembol zaten ekli', true); return; }

  const newSym = {id, name, cat, src};
  if (src === 'binance') newSym.binanceTicker = id.toLowerCase();
  if (src === 'frankfurter') { newSym.fxBase = id.slice(0,3); newSym.fxQuote = id.slice(3,6); }
  if (src === 'twelvedata') newSym.tdSymbol = id;
  if (src === 'coingecko') newSym.cgKey = id.toLowerCase();

  symbols.push(newSym);
  candleData[id] = genCandles(100, 100, 0.025);
  const last = candleData[id][candleData[id].length - 1];
  prices[id] = {price:last.close, change:0, open:last.close, high:last.close, low:last.close, vol:0, updatedAt:0, source:'demo'};

  document.getElementById('newSymbol').value = '';
  document.getElementById('newName').value = '';
  renderSymbolList();
  render();
  if (src === 'binance') startBinanceWS(); // reconnect with new symbol
  if (src === 'twelvedata' && BACKEND_URL) fetchTwelveData();
  showToast('✅ ' + name + ' eklendi');
}

function removeSymbol(id) {
  symbols = symbols.filter(s => s.id !== id);
  delete candleData[id];
  delete prices[id];
  renderSymbolList();
  render();
  showToast('Sembol kaldırıldı');
}

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function fmt(n) {
  if (n === undefined || n === null || isNaN(n)) return '—';
  const a = Math.abs(n);
  if (a >= 1e12) return (n/1e12).toFixed(2)+'T';
  if (a >= 1e9)  return (n/1e9).toFixed(2)+'B';
  if (a >= 1e6)  return (n/1e6).toFixed(2)+'M';
  if (a >= 10000) return n.toLocaleString('en',{maximumFractionDigits:2});
  if (a >= 1)    return n.toFixed(4);
  if (a >= 0.001) return n.toFixed(5);
  return n.toFixed(8);
}

function fmtChg(c) {
  if (c === undefined || isNaN(c)) return '—';
  return (c>=0?'+':'')+c.toFixed(2)+'%';
}

let toastTimer;
function showToast(msg, isError=false, duration=3500, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError?' error':'') + (type==='warn'?' warn':'');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), duration);
}
